<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login Failed - CodeX</title>
  <link href="https://fonts.googleapis.com/css2?family=Arvo&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.26/bundled/lenis.min.js"></script>

  <style>
    .page_404 {
      padding: 40px 0;
      background: #fff;
      font-family: 'Arvo', serif;
      text-align: center;
    }

      html {
    scroll-behavior: auto;
    will-change: transform;
    transform: translateZ(0);
  }


    .four_zero_four_bg {
      background-image: url(https://cdn.dribbble.com/users/285475/screenshots/2083086/dribbble_1.gif);
      height: 400px;
      background-position: center;
      background-repeat: no-repeat;
    }

    .four_zero_four_bg h1 {
      font-size: 80px;
    }

    .contant_box_404 {
      margin-top: -50px;
    }

    .contant_box_404 h3 {
      font-size: 26px;
      color: #111;
    }

    .contant_box_404 p {
      color: #666;
    }

    .link_404 {
      color: #fff !important;
      padding: 10px 20px;
      background: #39ac31;
      margin: 20px 0;
      display: inline-block;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <section class="page_404">
    <div class="container">
      <div class="row">
        <div class="col-sm-12">
          <div class="col-sm-10 col-sm-offset-1 text-center">
            <div class="four_zero_four_bg">
              <h1 class="text-center">401</h1>
            </div>

            <div class="contant_box_404">
              <h3 class="h2">Authentication Failed</h3>
              <p>The email or password you entered is incorrect.</p>
              <a href="/auth" class="link_404">Back to Login</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

<script>
  const lenis = new Lenis({
    duration: 1.2,
    easing: t => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
    smooth: true
  });
  function raf(time) {
    lenis.raf(time);
    requestAnimationFrame(raf);
  }
  requestAnimationFrame(raf);
</script>


</body>
</html>
