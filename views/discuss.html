<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Global Discussion - CodeX</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background-color: #121212;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 2rem;
      font-family: 'Segoe UI', sans-serif;
    }

    .comment-box {
      background-color: #1e1e1e;
      padding: 1rem 1.25rem;
      border-radius: 10px;
      margin-bottom: 1rem;
      border-left: 6px solid;
      max-width: 600px;
      word-wrap: break-word;
    }

    .comment-meta {
      font-size: 0.9rem;
      color: #bbb;
      margin-bottom: 0.4rem;
    }

    .btn-post {
      width: 100%;
    }

    .comment-container {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Generate color class for usernames */
    <% const colors = ['#ff6b6b', '#6bc5ff', '#81c784', '#f4b400', '#ba68c8', '#ff8a65', '#4dd0e1', '#dce775']; %>
    <% const colorMap = {}; let colorIndex = 0; %>
    <% comments.forEach(c => { if (!colorMap[c.username]) colorMap[c.username] = colors[(colorIndex++) % colors.length]; }); %>
    <% Object.keys(colorMap).forEach(username => { %>
      .border-<%= username.replace(/\s+/g, '-') %> {
        border-color: <%= colorMap[username] %> !important;
      }
    <% }); %>
  </style>
</head>
<body>
  <div class="container">
    <h1 class="mb-4 text-center">🌐 Global Discussion (Post Only)</h1>

    <form action="/comment" method="POST" class="mb-4">
      <input
        type="text"
        name="username"
        class="form-control mb-3"
        placeholder="Your Name"
        maxlength="20"
        required
      />
      <textarea
        name="message"
        class="form-control mb-3"
        placeholder="Write something..."
        rows="3"
        maxlength="300"
        required
      ></textarea>
      <button type="submit" class="btn btn-primary btn-post">Post</button>
    </form>

    <div class="comment-container">
      <% if (comments.length === 0) { %>
        <p class="text-center">No comments yet. Be the first!</p>
      <% } else { %>
        <% comments.forEach(comment => { %>
          <div class="comment-box border-<%= comment.username.replace(/\s+/g, '-') %>">
            <div class="comment-meta">
              <strong><%= comment.username %></strong> •
              <small><%= comment.timestamp.toLocaleString() %></small>
            </div>
            <div><%= comment.message %></div>
          </div>
        <% }) %>
      <% } %>
    </div>
  </div>
</body>
</html>
